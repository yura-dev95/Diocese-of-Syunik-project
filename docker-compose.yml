services:
  postgres:
    image: postgres:16-alpine
    container_name: syunik-diocese-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: syunik_diocese
    ports:
      - "5433:5432"
    volumes:
      - syunik_diocese_postgres_data:/var/lib/postgresql/data

volumes:
  syunik_diocese_postgres_data:
